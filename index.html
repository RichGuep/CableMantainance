<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">fondo
    <title>GMAO Doppelmayr - Alta Visibilidad</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #f5f6fc; /* Fondo negro profundo texturizado */
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Panel Lateral de Mantenimiento */
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 380px;
            background: rgba(15, 22, 36, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid #00adb5; /* Borde Cyan Tecnológico */
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 0 25px rgba(0, 173, 181, 0.3);
            transition: all 0.3s ease;
            display: none; 
            z-index: 10;
        }

        h2 {
            color: #00adb5;
            margin-bottom: 14px;
            font-size: 1.3rem;
            border-bottom: 2px solid #00adb5;
            padding-bottom: 6px;
            text-transform: uppercase;
        }

        .data-group {
            margin-bottom: 12px;
        }

        .data-label {
            font-size: 0.75rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .data-value {
            font-size: 1rem;
            font-weight: 600;
            color: #edf2f7;
        }

        .data-desc {
            font-size: 0.85rem;
            color: #cbd5e0;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 4px;
            margin-top: 4px;
            line-height: 1.3;
            border-left: 3px solid #00adb5;
        }

        .falla-input {
            width: 100%;
            background: #1a202c;
            border: 1px solid #4a5568;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 6px;
            resize: none;
            font-size: 0.9rem;
        }

        .falla-input:focus {
            outline: none;
            border-color: #00adb5;
        }

        .btn-ot {
            display: block;
            width: 100%;
            background: #ff5722;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
        }

        .btn-ot:hover {
            background: #e64a19;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(11, 12, 16, 0.9);
            border: 1px solid #00adb5;
            padding: 12px 24px;
            border-radius: 30px;
            pointer-events: none;
            font-size: 0.85rem;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 173, 181, 0.2);
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="instructions">🖱️ Selección de Activos: Haz clic sobre cualquier pieza para extraerla e inspeccionarla</div>

    <div id="info-panel">
        <h2 id="part-name">Componente</h2>
        
        <div class="data-group">
            <div class="data-label">Código de Elemento</div>
            <div id="part-id" class="data-value">-</div>
        </div>
        
        <div class="data-group">
            <div class="data-label">Especificación / Ficha Técnica</div>
            <div id="part-desc" class="data-desc">-</div>
        </div>

        <div class="data-group">
            <div class="data-label">Criticidad Mantenimiento</div>
            <div id="part-crit" class="data-value">-</div>
        </div>

        <div class="data-group">
            <div class="data-label">Reportar Daño u Observación para la OT</div>
            <textarea id="falla-descripcion" class="falla-input" rows="3" placeholder="Ej: Fisura en acrílico, juego en pernos de amortiguador..."></textarea>
        </div>

        <button class="btn-ot" onclick="crearOrdenTrabajo()">Levantar Orden de Trabajo</button>
    </div>

    <script {twc-raw}>
        // --- 1. CONFIGURACIÓN DEL ESCENARIO ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0b0c10); // Negro técnico profundo

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 2, 7.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- ILUMINACIÓN FOTOGRÁFICA DE ALTO CONTRASTE ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3); // Luz ambiental base
        scene.add(ambientLight);
        
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.4); // Luz principal blanca (Superior derecha frontal)
        sunLight.position.set(6, 12, 8);
        scene.add(sunLight);

        const floorLight = new THREE.DirectionalLight(0xffffff, 0.4); // Luz inferior para aclarar la base de la cabina
        floorLight.position.set(0, -5, 0);
        scene.add(floorLight);

        const neonRimLight = new THREE.DirectionalLight(0x00adb5, 1.2); // Luz de contorno Cyan trasera (Efecto neón aislante)
        neonRimLight.position.set(-6, 4, -6);
        scene.add(neonRimLight);

        // --- 2. BASE DE DATOS SEGÚN PLANO TÉCNICO ---
        const baseDatosPiezas = {
            "Mecanismo_Pinza": { nombre: "Pinza de Acoplamiento y Rodillos", id: "DOPP-PIN-A108", crit: "Crítica", desc: "Mecanismo de agarre desembragable al cable de acero. Distancia reglamentaria de operación: 60 metros entre cabinas." },
            "Brazo_Suspension": { nombre: "Brazo de Suspensión Curvo", id: "DOPP-BRZ-OMEGA", crit: "Alta", desc: "Estructura principal de aluminio forjado de alta resistencia que conecta el chasis habitáculo con la pinza superior." },
            "Amortiguador": { nombre: "Amortiguador de Torsión", id: "DOPP-AMOR-T", crit: "Alta", desc: "Bloque elástico de amortiguación dispuesto en el nodo de articulación superior para estabilizar las oscilaciones de la cabina." },
            "Panel_Solar": { nombre: "Panel Solar Fotovoltaico", id: "DOPP-SOLAR-01", crit: "Media", desc: "Toma de energía renovable para la alimentación del sistema interno de iluminación led y altavoces de intercomunicación." },
            "Bateria": { nombre: "Banco de Baterías de Respaldo", id: "DOPP-BAT-12V", crit: "Alta", desc: "Acumulador de energía encargado de sostener los sistemas eléctricos en ausencia de radiación solar directa." },
            "Parachoques": { nombre: "Parachoques Laterales Elastómero", id: "DOPP-PAR-SIDE", crit: "Baja", desc: "Topes de protección contra impactos suaves en las zonas de embarque y almacenamiento en estaciones." },
            "Puerta": { nombre: "Sistema de Puertas Corredizas", id: "DOPP-PORT-DBL", crit: "Alta", desc: "Mecanismo automático de desplazamiento lateral asistido. Apertura coordinada en ambos costados mecánicamente." },
            "Apoyo_Pies": { nombre: "Apoyo para Pies / Estribo", id: "DOPP-FOOT-STP", crit: "Baja", desc: "Plataforma inferior de aluminio antideslizante para la asistencia de acceso de pasajeros a bordo." },
            "Persianas": { nombre: "Persianas de Ventilación Inferior", id: "DOPP-VENT-INF", crit: "Baja", desc: "Rejillas de ventilación pasiva estructurales integradas para la circulación continua de aire fresco." },
            "Chasis_Acrilico": { nombre: "Chasis Estructural y Acrílicos", id: "DOPP-CHAS-OMEGA", crit: "Media", desc: "Estructuras perimetrales de aluminio aeroespacial con ventanas panorámicas de acrílico de alta resistencia mecánica." }
        };

        // --- 3. MODELADO DE COMPONENTES DE ALTA VISIBILIDAD ---
        const cabinaGrupo = new THREE.Group();
        scene.add(cabinaGrupo);
        const estadoOriginales = new Map();

        // Materiales de alta definición y contraste cromático
        const matAluminioBrillante = new THREE.MeshStandardMaterial({ color: 0xe2e8f0, roughness: 0.1, metalness: 0.9 }); // Aluminio pulido reflectivo
        const matGrisContraste = new THREE.MeshStandardMaterial({ color: 0x4a5568, roughness: 0.3, metalness: 0.6 }); // Componentes mecánicos visibles
        const matCauchoOscuro = new THREE.MeshStandardMaterial({ color: 0x1a202c, roughness: 0.7, metalness: 0.2 }); // Gomas marcadas
        const matVidrioCian = new THREE.MeshStandardMaterial({ color: 0x3182ce, transparent: true, opacity: 0.35, roughness: 0.05, metalness: 0.3 }); // Vidrios azul/cyan translúcidos
        const matSolarElectrico = new THREE.MeshStandardMaterial({ color: 0x1d4ed8, roughness: 0.1, metalness: 0.7 }); // Azul rey eléctrico

        function registrarComponente(objeto, nombreClave) {
            objeto.name = nombreClave;
            cabinaGrupo.add(objeto);
            estadoOriginales.set(nombreClave, { posicion: objeto.position.clone(), materiales: [] });
            objeto.traverse((child) => {
                if (child.isMesh) {
                    child.name = nombreClave;
                    estadoOriginales.get(nombreClave).materiales.push({
                        mesh: child, color: child.material.color.getHex(), transparent: child.material.transparent, opacity: child.material.opacity
                    });
                }
            });
        }

        // A. Chasis Habitáculo (Acrílicos y Esquinas de Aluminio integradas)
        const chasisG = new THREE.Group();
        const geoVidrio = new THREE.BoxGeometry(2.2, 1.8, 1.8);
        const vidrio = new THREE.Mesh(geoVidrio, matVidrioCian);
        chasisG.add(vidrio);

        // Marcos perimetrales super marcados en aluminio blanco reflectivo
        const geoMarco = new THREE.BoxGeometry(2.26, 0.08, 1.86);
        const mSup = new THREE.Mesh(geoMarco, matAluminioBrillante); mSup.position.y = 0.9;
        const mInf = mSup.clone(); mInf.position.y = -0.9;
        chasisG.add(mSup, mInf);

        // Columnas angulares reflectivas
        const geoCol = new THREE.BoxGeometry(0.08, 1.8, 0.08);
        const c1 = new THREE.Mesh(geoCol, matAluminioBrillante); c1.position.set(1.1, 0, 0.9);
        const c2 = c1.clone(); c2.position.set(-1.1, 0, 0.9);
        const c3 = c1.clone(); c3.position.set(1.1, 0, -0.9);
        const c4 = c1.clone(); c4.position.set(-1.1, 0, -0.9);
        chasisG.add(c1, c2, c3, c4);
        registrarComponente(chasisG, "Chasis_Acrilico");

        // B. Brazo de Suspensión Curvo (Resalta en aluminio puro)
        const brazoG = new THREE.Group();
        const curva = new THREE.CatmullRomCurve3([
            new THREE.Vector3(0, 3.1, 0),
            new THREE.Vector3(-0.4, 2.3, 0),
            new THREE.Vector3(-0.4, 1.5, 0),
            new THREE.Vector3(0, 1.0, 0)
        ]);
        const geoBrazo = new THREE.TubeGeometry(curva, 32, 0.12, 16, false);
        const brazoMesh = new THREE.Mesh(geoBrazo, matAluminioBrillante);
        brazoG.add(brazoMesh);
        registrarComponente(brazoG, "Brazo_Suspension");

        // C. Amortiguador de Torsión Superior
        const amortG = new THREE.Group();
        const geoAmort = new THREE.BoxGeometry(0.35, 0.2, 0.45);
        const amort = new THREE.Mesh(geoAmort, matCauchoOscuro);
        amortG.add(amort);
        amortG.position.set(-0.1, 1.05, 0);
        registrarComponente(amortG, "Amortiguador");

        // D. Pinza de Agarre (Gris de ingeniería con rodillos de acero brillante)
        const pinzaG = new THREE.Group();
        const geoP = new THREE.BoxGeometry(0.4, 0.3, 0.8);
        const pM = new THREE.Mesh(geoP, matGrisContraste); pinzaG.add(pM);
        const geoR = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16);
        const r1 = new THREE.Mesh(geoR, matAluminioBrillante); r1.rotation.z = Math.PI/2; r1.position.set(0.25, 0, 0.2);
        const r2 = r1.clone(); r2.position.z = -0.2; pinzaG.add(r1, r2);
        pinzaG.position.y = 3.2;
        registrarComponente(pinzaG, "Mecanismo_Pinza");

        // E. Panel Solar (Azul eléctrico súper llamativo)
        const solarG = new THREE.Group();
        const geoSol = new THREE.BoxGeometry(0.6, 0.04, 0.5);
        const sol = new THREE.Mesh(geoSol, matSolarElectrico); sol.rotation.x = -0.3; solarG.add(sol);
        solarG.position.set(0.4, 1.02, 0.4);
        registrarComponente(solarG, "Panel_Solar");

        // F. Batería
        const batG = new THREE.Group();
        const geoBat = new THREE.BoxGeometry(0.3, 0.2, 0.3);
        const bat = new THREE.Mesh(geoBat, matGrisContraste); batG.add(bat);
        batG.position.set(0.4, 1.02, -0.4);
        registrarComponente(batG, "Bateria");

        // G. Parachoques Matizados
        const paraG = new THREE.Group();
        const geoPara = new THREE.SphereGeometry(0.25, 16, 16); geoPara.scale(0.5, 1, 1.4);
        const pL = new THREE.Mesh(geoPara, matCauchoOscuro); pL.position.set(1.1, -0.1, 0);
        const pR = pL.clone(); pR.position.x = -1.1; paraG.add(pL, pR);
        registrarComponente(paraG, "Parachoques");

        // H. Puerta de Acceso (Marco remarcado)
        const puertaG = new THREE.Group();
        const geoPuerta = new THREE.BoxGeometry(0.03, 1.5, 0.8);
        const pMesh = new THREE.Mesh(geoPuerta, matVidrioCian);
        const pMarco = new THREE.Mesh(new THREE.BoxGeometry(0.05, 1.54, 0.84), matAluminioBrillante);
        pMarco.material.wireframe = true; // Resalta la rejilla de la puerta
        puertaG.add(pMesh, pMarco);
        puertaG.position.set(0, -0.1, 0.91);
        registrarComponente(puertaG, "Puerta");

        // I. Apoyo para Pies (Estribo brillante)
        const pieG = new THREE.Group();
        const geoPie = new THREE.BoxGeometry(0.22, 0.05, 0.9);
        const pie = new THREE.Mesh(geoPie, matAluminioBrillante); pieG.add(pie);
        pieG.position.set(0.6, -0.95, 0.91);
        registrarComponente(pieG, "Apoyo_Pies");

        // J. Persianas de Ventilación Inferior
        const ventG = new THREE.Group();
        const geoVent = new THREE.BoxGeometry(1.2, 0.2, 0.03);
        const vent = new THREE.Mesh(geoVent, matGrisContraste); vent.material.wireframe = true; ventG.add(vent);
        ventG.position.set(0, -0.6, 0.91);
        registrarComponente(ventG, "Persianas");

        cabinaGrupo.position.y = -1.0;

        // --- 4. RAYCASTING Y DETECCIÓN ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let componenteActivo = null;
        let objetivosAnimacion = [];

        window.addEventListener('click', onMouseClick, false);

        function onMouseClick(event) {
            if (event.target.closest('#info-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cabinaGrupo.children, true);

            if (intersects.length > 0) {
                let raiz = intersects[0].object;
                while (raiz.parent && raiz.parent !== cabinaGrupo) raiz = raiz.parent;

                if (componenteActivo && componenteActivo !== raiz) restaurarEstado();

                if (componenteActivo !== raiz) {
                    componenteActivo = raiz;
                    // Extracción lateral dramática en el eje X para revisión limpia
                    objetivosAnimacion = [{ objeto: componenteActivo, posFinal: new THREE.Vector3(2.5, estadoOriginales.get(componenteActivo.name).posicion.y, 0) }];
                    
                    // Atenuación de las partes no seleccionadas
                    cabinaGrupo.children.forEach((modulo) => {
                        modulo.traverse((child) => {
                            if (child.isMesh) {
                                child.material.transparent = true;
                                if (child.name === componenteActivo.name) {
                                    child.material.opacity = 1.0;
                                } else {
                                    child.material.opacity = 0.08; // Mayor atenuación para enfoque total
                                }
                            }
                        });
                    });
                    mostrarPanel(componenteActivo.name);
                }
            } else {
                restaurarEstado();
            }
        }

        function restaurarEstado() {
            objetivosAnimacion = [];
            cabinaGrupo.children.forEach((modulo) => {
                const orig = estadoOriginales.get(modulo.name);
                if(orig) objetivosAnimacion.push({ objeto: modulo, posFinal: orig.posicion.clone() });
            });

            estadoOriginales.forEach((data) => {
                data.materiales.forEach((m) => { m.mesh.material.transparent = m.transparent; m.mesh.material.opacity = m.opacity; });
            });
            componenteActivo = null;
            document.getElementById('info-panel').style.display = 'none';
        }

        function mostrarPanel(clave) {
            const info = baseDatosPiezas[clave];
            if (info) {
                document.getElementById('part-name').innerText = info.nombre;
                document.getElementById('part-id').innerText = info.id;
                document.getElementById('part-desc').innerText = info.desc;
                document.getElementById('part-crit').innerText = info.crit;
                document.getElementById('falla-descripcion').value = '';

                const cEl = document.getElementById('part-crit');
                if (info.crit === "Crítica") cEl.style.color = "#fc8181";
                else if (info.crit === "Alta") cEl.style.color = "#f6ad55";
                else cEl.style.color = "#68d391";

                document.getElementById('info-panel').style.display = 'block';
            }
        }

        function crearOrdenTrabajo() {
            if (componenteActivo) {
                const info = baseDatosPiezas[componenteActivo.name];
                const comentario = document.getElementById('falla-descripcion').value.trim() || "Mantenimiento preventivo.";
                alert(`📋 ORDEN DE TRABAJO PROCESADA\n\nComponente: ${info.nombre}\nCódigo: ${info.id}\nFalla: "${comentario}"`);
                restaurarEstado();
            }
        }

        // --- 5. LOOP DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            objetivosAnimacion.forEach((t) => { t.objeto.position.lerp(t.posFinal, 0.15); });

            // Rotación suave del conjunto si no se está auditando ninguna pieza
            if (controls.state === -1 && !componenteActivo) {
                cabinaGrupo.rotation.y += 0.0015;
            } else if (componenteActivo) {
                cabinaGrupo.rotation.y = 0; 
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
