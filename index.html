<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMAO 3D - Cabinas Doppelmayr</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            overflow: hidden;
            background-color: #111317;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Panel de Información Lateral */
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 360px;
            background: rgba(20, 24, 33, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
            display: none; 
            z-index: 10;
        }

        h2 {
            color: #00adb5;
            margin-bottom: 18px;
            font-size: 1.3rem;
            border-bottom: 2px solid #00adb5;
            padding-bottom: 6px;
        }

        .data-group {
            margin-bottom: 14px;
        }

        .data-label {
            font-size: 0.75rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .data-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: #edf2f7;
        }

        .falla-input {
            width: 100%;
            background: #1a202c;
            border: 1px solid #4a5568;
            color: white;
            padding: 10px;
            border-radius: 6px;
            margin-top: 6px;
            resize: none;
            font-size: 0.9rem;
        }

        .falla-input:focus {
            outline: none;
            border-color: #00adb5;
        }

        .btn-ot {
            display: block;
            width: 100%;
            background: #ff5722;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-ot:hover {
            background: #e64a19;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 30px;
            pointer-events: none;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    <div id="instructions">🖱️ Clic en un componente para extraerlo lateralmente y revisarlo</div>

    <div id="info-panel">
        <h2 id="part-name">Componente</h2>
        
        <div class="data-group">
            <div class="data-label">Código Doppelmayr</div>
            <div id="part-id" class="data-value">-</div>
        </div>
        
        <div class="data-group">
            <div class="data-label">Criticidad del Activo</div>
            <div id="part-crit" class="data-value">-</div>
        </div>
        
        <div class="data-group">
            <div class="data-label">Estado Físico</div>
            <div id="part-status" class="data-value">-</div>
        </div>

        <div class="data-group">
            <div class="data-label">Reporte Técnico de Falla</div>
            <textarea id="falla-descripcion" class="falla-input" rows="3" placeholder="Describa el hallazgo o anomalía en la pieza..."></textarea>
        </div>

        <button class="btn-ot" onclick="crearOrdenTrabajo()">Enviar Orden de Trabajo</button>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL ENTORNO ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111317);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 2, 8); // Ajuste de ángulo para ver la perspectiva tipo render

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Luces para resaltar texturas metálicas de la imagen
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);

        // --- 2. BASE DE DATOS TÉCNICA ---
        const baseDatosPiezas = {
            "Mecanismo_Pinza": { nombre: "Pinza de Agarre Bornaza A-108", id: "DOPP-PZ-09", crit: "Crítica", estado: "Desgaste de rodillos" },
            "Brazo_Suspension": { nombre: "Brazo de Suspensión Recto", id: "DOPP-BR-44", crit: "Alta", estado: "Estructura Conforme" },
            "Panel_Solar": { nombre: "Módulo Fotovoltaico de Techo", id: "DOPP-SOL-12", crit: "Media", estado: "Requiere Limpieza" },
            "Chasis_Cabina": { nombre: "Habáculo / Chasis OMEGA", id: "DOPP-CAB-88", crit: "Media", estado: "Operativo" }
        };

        // --- 3. CONSTRUCCIÓN DETALLADA DEL MODELO ---
        const cabinaGrupo = new THREE.Group();
        scene.add(cabinaGrupo);

        // Almacenamiento de posiciones y materiales iniciales para restaurar al deseleccionar
        const estadoOriginales = new Map();

        function registrarComponente(objeto, nombreClave) {
            objeto.name = nombreClave;
            cabinaGrupo.add(objeto);
            
            // Guardamos su posición original en el espacio
            estadoOriginales.set(nombreClave, {
                posicion: objeto.position.clone(),
                materiales: []
            });

            // Guardamos sus opacidades y propiedades iniciales
            objeto.traverse((child) => {
                if (child.isMesh) {
                    child.name = nombreClave;
                    estadoOriginales.get(nombreClave).materiales.push({
                        mesh: child,
                        color: child.material.color.getHex(),
                        transparent: child.material.transparent,
                        opacity: child.material.opacity
                    });
                }
            });
        }

        const matMetalAluminio = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.2, metalness: 0.8 });
        const matGrisOscuro = new THREE.MeshStandardMaterial({ color: 0x2d3748, roughness: 0.4, metalness: 0.6 });

        // A. Chasis de Pasajeros
        const chasisG = new THREE.Group();
        const geoBase = new THREE.BoxGeometry(2.4, 1.8, 2.2);
        const matVidrio = new THREE.MeshStandardMaterial({ color: 0x1a202c, transparent: true, opacity: 0.5, roughness: 0.1 });
        const baseMesh = new THREE.Mesh(geoBase, matVidrio);
        chasisG.add(baseMesh);

        // Marcos metálicos de las esquinas (Como el render)
        const geoArista = new THREE.BoxGeometry(2.45, 0.1, 2.25);
        const marcoSup = new THREE.Mesh(geoArista, matMetalAluminio);
        marcoSup.position.y = 0.9;
        const marcoInf = marcoSup.clone();
        marcoInf.position.y = -0.9;
        chasisG.add(marcoSup, marcoInf);
        registrarComponente(chasisG, "Chasis_Cabina");

        // B. Brazo de Suspensión Recto (Fiel a la nueva imagen)
        const brazoG = new THREE.Group();
        const geoBrazoVertical = new THREE.BoxGeometry(0.15, 2.2, 0.3);
        const brazoV = new THREE.Mesh(geoBrazoVertical, matMetalAluminio);
        brazoV.position.set(0, 2.0, 0);
        brazoG.add(brazoV);
        registrarComponente(brazoG, "Brazo_Suspension");

        // C. Pinza Superior con Sistemas Hidráulicos
        const pinzaG = new THREE.Group();
        const geoPinzaBox = new THREE.BoxGeometry(0.5, 0.4, 0.8);
        const pinzaBox = new THREE.Mesh(geoPinzaBox, matGrisOscuro);
        pinzaG.add(pinzaBox);

        const geoRueda = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 16);
        const rueda = new THREE.Mesh(geoRueda, matMetalAluminio);
        rueda.rotation.z = Math.PI / 2;
        rueda.position.set(0.3, 0.1, 0.2);
        pinzaG.add(rueda);
        
        pinzaG.position.y = 3.2;
        registrarComponente(pinzaG, "Mecanismo_Pinza");

        // D. Panel Solar del Techo (Novedad de la foto)
        const solarG = new THREE.Group();
        const geoPlaca = new THREE.BoxGeometry(0.8, 0.05, 0.8);
        const matSolar = new THREE.MeshStandardMaterial({ color: 0x1e3a8a, roughness: 0.1, metalness: 0.5 });
        const placa = new THREE.Mesh(geoPlaca, matSolar);
        placa.rotation.x = -0.2; // Inclinado hacia el sol
        solarG.add(placa);
        solarG.position.set(0, 1.0, 0.4);
        registrarComponente(solarG, "Panel_Solar");


        // --- 4. LÓGICA DE INTERACCIÓN Y EXTRACCIÓN (INDIVIDUALIZACIÓN) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let componenteActivo = null;

        // Variables para controlar las transiciones fluidas por código
        let objetivosAnimacion = [];

        window.addEventListener('click', onMouseClick, false);

        function onMouseClick(event) {
            if (event.target.closest('#info-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cabinaGrupo.children, true);

            if (intersects.length > 0) {
                let objetoRaiz = intersects[0].object;
                while (objetoRaiz.parent && objetoRaiz.parent !== cabinaGrupo) {
                    objetoRaiz = objetoRaiz.parent;
                }

                if (componenteActivo && componenteActivo !== objetoRaiz) {
                    restaurarTodoALaNormalidad();
                }

                if (componenteActivo !== objetoRaiz) {
                    componenteActivo = objetoRaiz;
                    extraerComponenteLateral(componenteActivo);
                    mostrarPanel(componenteActivo.name);
                }
            } else {
                restaurarTodoALaNormalidad();
            }
        }

        function extraerComponenteLateral(componente) {
            objetivosAnimacion = [];
            
            // 1. Animamos el componente seleccionado moviéndose a la derecha (Eje X)
            objetivosAnimacion.push({
                objeto: componente,
                posFinal: new THREE.Vector3(2.5, estadoOriginales.get(componente.name).posicion.y, 0)
            });

            // 2. Opacamos todo lo demás para dar enfoque total a la pieza extraída
            cabinaGrupo.children.forEach((modulo) => {
                modulo.traverse((child) => {
                    if (child.isMesh) {
                        child.material.transparent = true;
                        if (child.name !== componente.name) {
                            child.material.opacity = 0.15; // Atenuado masivo
                        } else {
                            child.material.opacity = 1.0; // Resaltado completo
                        }
                    }
                });
            });
        }

        function restaurarTodoALaNormalidad() {
            objetivosAnimacion = [];

            // Regresar todas las piezas a su posición matemática original
            cabinaGrupo.children.forEach((modulo) => {
                const orig = estadoOriginales.get(modulo.name);
                if(orig) {
                    objetivosAnimacion.push({
                        objeto: modulo,
                        posFinal: orig.posicion.clone()
                    });
                }
            });

            // Restaurar los materiales y transparencias de fábrica
            estadoOriginales.forEach((data) => {
                data.materiales.forEach((matInfo) => {
                    matInfo.mesh.material.transparent = matInfo.transparent;
                    matInfo.mesh.material.opacity = matInfo.opacity;
                });
            });

            componenteActivo = null;
            document.getElementById('info-panel').style.display = 'none';
        }

        function mostrarPanel(clave) {
            const info = baseDatosPiezas[clave];
            if (info) {
                document.getElementById('part-name').innerText = info.nombre;
                document.getElementById('part-id').innerText = info.id;
                document.getElementById('part-crit').innerText = info.crit;
                document.getElementById('part-status').innerText = info.estado;
                document.getElementById('falla-descripcion').value = '';
                
                const critEl = document.getElementById('part-crit');
                if (info.crit === "Crítica") critEl.style.color = "#fc8181";
                else if (info.crit === "Alta") critEl.style.color = "#f6ad55";
                else critEl.style.color = "#68d391";

                document.getElementById('info-panel').style.display = 'block';
            }
        }

        function crearOrdenTrabajo() {
            if (componenteActivo) {
                const info = baseDatosPiezas[componenteActivo.name];
                const desc = document.getElementById('falla-descripcion').value.trim() || "Inspección correctiva inmediata.";
                
                alert(`⚙️ SISTEMA CMMS INTEGRADO\n\n` +
                      `Orden de Trabajo despachada para: ${info.nombre}\n` +
                      `Código de Inventario: ${info.id}\n` +
                      `Reporte de Daño: "${desc}"`);
                
                restaurarTodoALaNormalidad();
            }
        }

        // --- 5. BUCLE DE ANIMACIONES (Interpolación de movimiento) ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Desplazamiento suave (Lerp) para simular el efecto de expulsión o retorno
            objetivosAnimacion.forEach((tarea) => {
                tarea.objeto.position.lerp(tarea.posFinal, 0.12);
            });
            
            // Rotación pasiva sutil global si nadie está tocando la pantalla ni inspeccionando
            if (controls.state === -1 && !componenteActivo) {
                cabinaGrupo.rotation.y += 0.001;
            } else if (componenteActivo) {
                cabinaGrupo.rotation.y = 0; // Detener rotación durante auditoría técnica
            }

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
